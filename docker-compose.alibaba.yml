version: '3.9'

# InboxPilot — Production stack for Alibaba Cloud (ECS / SAS)
# Usage:
#   cp .env.example .env && nano .env   # fill in secrets
#   docker compose -f docker-compose.alibaba.yml up -d

services:
  # ── MCP Tool Server (:4001) ───────────────────────────────────
  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    restart: unless-stopped
    ports:
      - '4001:4001'
    environment:
      - NODE_ENV=production
      - PORT=4001
      - MCP_API_KEY=${MCP_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    mem_limit: 512m
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

  # ── API + BullMQ Worker (:3001) ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      - MCP_SERVER_URL=http://mcp:4001
      - MCP_API_KEY=${MCP_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.8}
      - FOLLOWUP_DELAY_DAYS=${FOLLOWUP_DELAY_DAYS:-2}
      - FOLLOWUP_MAX_COUNT=${FOLLOWUP_MAX_COUNT:-2}
      - JWT_SECRET=${JWT_SECRET}
      - PDF_OUTPUT_DIR=/tmp/inbox-pilot/pdfs
    depends_on:
      mcp:
        condition: service_healthy
    mem_limit: 1g
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Dashboard (:3000) ─────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://${HOST_IP:-localhost}:3001
        - NEXT_PUBLIC_WS_URL=ws://${HOST_IP:-localhost}:3001
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://${HOST_IP:-localhost}:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-demo}
      - NEXT_PUBLIC_API_URL=http://${HOST_IP:-localhost}:3001
      - NEXT_PUBLIC_WS_URL=ws://${HOST_IP:-localhost}:3001
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 512m

  # ── Nginx reverse proxy (optional — for port 80/443) ──────────
  # Uncomment if you want to serve on port 80 behind nginx.
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - '80:80'
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - web
  #     - api
  #   restart: unless-stopped
